<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0a0f;
    --bg-card: #12121a;
    --bg-card-hover: #181824;
    --bg-elevated: #1a1a28;
    --border: #1e1e2e;
    --border-active: #2d2d44;
    --text-primary: #e8e8f0;
    --text-secondary: #8888a0;
    --text-muted: #555568;
    --accent-green: #22c55e;
    --accent-green-bg: rgba(34, 197, 94, 0.08);
    --accent-green-border: rgba(34, 197, 94, 0.2);
    --accent-blue: #3b82f6;
    --accent-blue-bg: rgba(59, 130, 246, 0.08);
    --accent-blue-border: rgba(59, 130, 246, 0.2);
    --accent-amber: #f59e0b;
    --accent-amber-bg: rgba(245, 158, 11, 0.08);
    --accent-amber-border: rgba(245, 158, 11, 0.2);
    --accent-red: #ef4444;
    --accent-red-bg: rgba(239, 68, 68, 0.08);
    --accent-red-border: rgba(239, 68, 68, 0.2);
    --accent-purple: #a855f7;
    --accent-purple-bg: rgba(168, 85, 247, 0.08);
    --accent-purple-border: rgba(168, 85, 247, 0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .noise-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }

  .glow-line {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-blue) 20%, var(--accent-purple) 50%, var(--accent-green) 80%, transparent);
    opacity: 0.6;
    z-index: 100;
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* HEADER */
  header {
    padding: 40px 0 32px;
    border-bottom: 1px solid var(--border);
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 24px;
  }

  .header-title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header-subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
    letter-spacing: 0.5px;
  }

  .header-meta {
    text-align: right;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }

  .header-meta .live-dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent-green);
    border-radius: 50%;
    margin-right: 6px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
    50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(34,197,94,0); }
  }

  /* STATS BAR */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    padding: 24px 0;
  }

  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    transition: all 0.2s ease;
  }

  .stat-card:hover {
    border-color: var(--border-active);
    background: var(--bg-card-hover);
  }

  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .stat-value {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -1px;
  }

  .stat-value.green { color: var(--accent-green); }
  .stat-value.blue { color: var(--accent-blue); }
  .stat-value.amber { color: var(--accent-amber); }
  .stat-value.red { color: var(--accent-red); }

  /* MAIN GRID */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    padding: 24px 0 48px;
  }

  .panel {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .panel-full { grid-column: 1 / -1; }

  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
  }

  .panel-title {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.2px;
  }

  .panel-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 6px;
    letter-spacing: 0.5px;
  }

  .badge-green { background: var(--accent-green-bg); color: var(--accent-green); border: 1px solid var(--accent-green-border); }
  .badge-blue { background: var(--accent-blue-bg); color: var(--accent-blue); border: 1px solid var(--accent-blue-border); }
  .badge-amber { background: var(--accent-amber-bg); color: var(--accent-amber); border: 1px solid var(--accent-amber-border); }
  .badge-red { background: var(--accent-red-bg); color: var(--accent-red); border: 1px solid var(--accent-red-border); }
  .badge-purple { background: var(--accent-purple-bg); color: var(--accent-purple); border: 1px solid var(--accent-purple-border); }

  .panel-body { padding: 16px 24px 24px; }

  /* AGENT CARDS */
  .agent-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
  }

  .agent-card {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    transition: all 0.2s ease;
  }

  .agent-card:hover {
    border-color: var(--border-active);
    transform: translateY(-1px);
  }

  .agent-card-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .agent-name {
    font-weight: 600;
    font-size: 14px;
  }

  .agent-status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .status-idle { background: var(--accent-blue-bg); color: var(--accent-blue); border: 1px solid var(--accent-blue-border); }
  .status-running { background: var(--accent-green-bg); color: var(--accent-green); border: 1px solid var(--accent-green-border); }
  .status-blocked { background: var(--accent-amber-bg); color: var(--accent-amber); border: 1px solid var(--accent-amber-border); }
  .status-error { background: var(--accent-red-bg); color: var(--accent-red); border: 1px solid var(--accent-red-border); }

  .agent-detail {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 4px;
    display: flex;
    justify-content: space-between;
  }

  .agent-detail-label {
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ACTIVITY LOG */
  .activity-list { list-style: none; }

  .activity-item {
    display: flex;
    gap: 16px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    align-items: flex-start;
  }

  .activity-item:last-child { border-bottom: none; }

  .activity-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-top: 5px;
    flex-shrink: 0;
  }

  .dot-complete { background: var(--accent-green); }
  .dot-in-progress { background: var(--accent-blue); animation: pulse 2s infinite; }
  .dot-queued { background: var(--text-muted); }
  .dot-failed { background: var(--accent-red); }

  .activity-content { flex: 1; }

  .activity-action {
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 2px;
  }

  .activity-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
  }

  .activity-category {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 3px;
    background: var(--bg-primary);
    color: var(--text-muted);
    border: 1px solid var(--border);
    margin-left: 8px;
  }

  /* KNOWLEDGE FEED */
  .kb-list { list-style: none; }

  .kb-item {
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
  }

  .kb-item:last-child { border-bottom: none; }

  .kb-item-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .kb-title {
    font-size: 13px;
    font-weight: 600;
  }

  .kb-summary {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  .kb-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 8px;
  }

  /* ALERTS */
  .alert-item {
    display: flex;
    gap: 12px;
    padding: 12px 16px;
    background: var(--accent-red-bg);
    border: 1px solid var(--accent-red-border);
    border-radius: 8px;
    margin-bottom: 8px;
    align-items: center;
  }

  .alert-icon { font-size: 16px; }
  .alert-text { font-size: 12px; color: var(--text-primary); }
  .alert-time { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); margin-left: auto; white-space: nowrap; }

  .empty-state {
    text-align: center;
    padding: 32px;
    color: var(--text-muted);
    font-size: 13px;
  }

  /* FILTER TABS */
  .filter-tabs {
    display: flex;
    gap: 4px;
  }

  .filter-tab {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 6px;
    background: transparent;
    color: var(--text-muted);
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.15s ease;
    letter-spacing: 0.5px;
  }

  .filter-tab:hover { color: var(--text-secondary); border-color: var(--border); }
  .filter-tab.active { color: var(--text-primary); background: var(--bg-elevated); border-color: var(--border-active); }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .main-grid { grid-template-columns: 1fr; }
    .agent-grid { grid-template-columns: 1fr; }
    .header-top { flex-direction: column; gap: 12px; }
    .header-meta { text-align: left; }
  }
</style>
</head>
<body>

<div class="noise-overlay"></div>
<div class="glow-line"></div>

<div class="container">
  <header>
    <div class="header-top">
      <div>
        <div class="header-title">Agent Command Center</div>
        <div class="header-subtitle">LEVEL UP REI &mdash; OPERATIONAL DASHBOARD</div>
      </div>
      <div class="header-meta">
        <div><span class="live-dot"></span>SYSTEM ONLINE</div>
        <div id="lastRefresh" style="margin-top:4px;"></div>
      </div>
    </div>
  </header>

  <!-- STATS BAR -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-label">Active Agents</div>
      <div class="stat-value green" id="statAgents">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Tasks Today</div>
      <div class="stat-value blue" id="statTasks">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">KB Updates</div>
      <div class="stat-value amber" id="statKB">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Open Alerts</div>
      <div class="stat-value red" id="statAlerts">—</div>
    </div>
  </div>

  <div class="main-grid">

    <!-- AGENTS PANEL -->
    <div class="panel panel-full">
      <div class="panel-header">
        <span class="panel-title">Agent Fleet</span>
        <div class="filter-tabs" id="agentFilters">
          <button class="filter-tab active" data-filter="all">ALL</button>
          <button class="filter-tab" data-filter="running">RUNNING</button>
          <button class="filter-tab" data-filter="idle">IDLE</button>
          <button class="filter-tab" data-filter="error">ERROR</button>
        </div>
      </div>
      <div class="panel-body">
        <div class="agent-grid" id="agentGrid"></div>
      </div>
    </div>

    <!-- ACTIVITY LOG -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Activity Log</span>
        <span class="panel-badge badge-blue" id="activityCount">0 entries</span>
      </div>
      <div class="panel-body">
        <ul class="activity-list" id="activityList"></ul>
      </div>
    </div>

    <!-- KNOWLEDGE BASE -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Knowledge Base Updates</span>
        <div class="filter-tabs" id="kbFilters">
          <button class="filter-tab active" data-filter="all">ALL</button>
          <button class="filter-tab" data-filter="strategy">STRATEGY</button>
          <button class="filter-tab" data-filter="client">CLIENT</button>
          <button class="filter-tab" data-filter="campaign">CAMPAIGN</button>
          <button class="filter-tab" data-filter="system">SYSTEM</button>
        </div>
      </div>
      <div class="panel-body">
        <ul class="kb-list" id="kbList"></ul>
      </div>
    </div>

    <!-- ALERTS -->
    <div class="panel panel-full">
      <div class="panel-header">
        <span class="panel-title">Alerts</span>
        <span class="panel-badge badge-red" id="alertCount">0 active</span>
      </div>
      <div class="panel-body" id="alertsBody">
        <div class="empty-state">No active alerts. All systems nominal.</div>
      </div>
    </div>

  </div>
</div>

<script>
  // ── CONFIG ──
  // When deployed to GitHub Pages, data files are in ./data/
  const DATA_BASE = './data/';

  // ── HELPERS ──
  function timeAgo(ts) {
    const diff = Date.now() - new Date(ts).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + 'm ago';
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    const days = Math.floor(hrs / 24);
    return days + 'd ago';
  }

  function statusClass(s) {
    return 'status-' + (s || 'idle').toLowerCase();
  }

  function dotClass(s) {
    const map = { complete: 'dot-complete', 'in-progress': 'dot-in-progress', queued: 'dot-queued', failed: 'dot-failed' };
    return map[s] || 'dot-queued';
  }

  function categoryBadge(cat) {
    const colors = { strategy: 'badge-purple', client: 'badge-blue', campaign: 'badge-green', system: 'badge-amber' };
    return colors[cat] || 'badge-blue';
  }

  // ── RENDER FUNCTIONS ──
  function renderAgents(agents, filter) {
    const grid = document.getElementById('agentGrid');
    const filtered = filter === 'all' ? agents : agents.filter(a => a.status === filter);

    if (!filtered.length) {
      grid.innerHTML = '<div class="empty-state">No agents match this filter.</div>';
      return;
    }

    grid.innerHTML = filtered.map(a => `
      <div class="agent-card">
        <div class="agent-card-top">
          <span class="agent-name">${a.name}</span>
          <span class="agent-status ${statusClass(a.status)}">${a.status}</span>
        </div>
        <div class="agent-detail">
          <span class="agent-detail-label">Domain</span>
          <span>${a.domain}</span>
        </div>
        <div class="agent-detail">
          <span class="agent-detail-label">Current</span>
          <span>${a.current_task || '—'}</span>
        </div>
        <div class="agent-detail">
          <span class="agent-detail-label">Last Action</span>
          <span>${a.last_action}</span>
        </div>
        <div class="agent-detail">
          <span class="agent-detail-label">Updated</span>
          <span>${timeAgo(a.last_updated)}</span>
        </div>
        <div class="agent-detail">
          <span class="agent-detail-label">Tasks Today</span>
          <span>${a.tasks_completed_today}</span>
        </div>
      </div>
    `).join('');
  }

  function renderActivity(log) {
    const list = document.getElementById('activityList');
    const recent = log.slice(-20).reverse();
    document.getElementById('activityCount').textContent = log.length + ' entries';

    if (!recent.length) {
      list.innerHTML = '<li class="empty-state">No activity recorded yet.</li>';
      return;
    }

    list.innerHTML = recent.map(l => `
      <li class="activity-item">
        <div class="activity-dot ${dotClass(l.status)}"></div>
        <div class="activity-content">
          <div class="activity-action">${l.action}<span class="activity-category">${l.category}</span></div>
          <div class="activity-meta">${l.agent_id} &middot; ${timeAgo(l.timestamp)}</div>
          ${l.detail ? `<div style="font-size:11px;color:var(--text-secondary);margin-top:4px;">${l.detail}</div>` : ''}
        </div>
      </li>
    `).join('');
  }

  function renderKB(updates, filter) {
    const list = document.getElementById('kbList');
    const filtered = filter === 'all' ? updates : updates.filter(u => u.category === filter);
    const recent = filtered.slice(-15).reverse();

    if (!recent.length) {
      list.innerHTML = '<li class="empty-state">No knowledge base updates yet.</li>';
      return;
    }

    list.innerHTML = recent.map(u => `
      <li class="kb-item">
        <div class="kb-item-header">
          <span class="kb-title">${u.title}</span>
          <span class="panel-badge ${categoryBadge(u.category)}">${u.category}</span>
        </div>
        <div class="kb-summary">${u.summary}</div>
        <div class="kb-meta">${u.source} &middot; ${timeAgo(u.timestamp)}</div>
      </li>
    `).join('');
  }

  function renderAlerts(alerts) {
    const body = document.getElementById('alertsBody');
    document.getElementById('alertCount').textContent = alerts.length + ' active';

    if (!alerts.length) {
      body.innerHTML = '<div class="empty-state">No active alerts. All systems nominal.</div>';
      return;
    }

    body.innerHTML = alerts.map(a => `
      <div class="alert-item">
        <span class="alert-icon">${a.severity === 'critical' ? '🔴' : '🟡'}</span>
        <span class="alert-text"><strong>${a.agent_id}:</strong> ${a.message}</span>
        <span class="alert-time">${timeAgo(a.timestamp)}</span>
      </div>
    `).join('');
  }

  function updateStats(agents, activity, kb, alerts) {
    const running = agents.filter(a => a.status === 'running').length;
    document.getElementById('statAgents').textContent = agents.length + (running ? ` (${running} active)` : '');

    const today = new Date().toISOString().slice(0, 10);
    const todayTasks = activity.filter(l => l.timestamp.startsWith(today) && l.status === 'complete').length;
    document.getElementById('statTasks').textContent = todayTasks;

    document.getElementById('statKB').textContent = kb.length;
    document.getElementById('statAlerts').textContent = alerts.length;
  }

  // ── DATA LOADING ──
  let STATE = { agents: [], activity: [], kb: [], alerts: [], agentFilter: 'all', kbFilter: 'all' };

  async function loadData() {
    try {
      const [agentsRes, activityRes, kbRes, alertsRes] = await Promise.all([
        fetch(DATA_BASE + 'agents.json'),
        fetch(DATA_BASE + 'activity.json'),
        fetch(DATA_BASE + 'knowledge.json'),
        fetch(DATA_BASE + 'alerts.json')
      ]);

      const agentsData = await agentsRes.json();
      const activityData = await activityRes.json();
      const kbData = await kbRes.json();
      const alertsData = await alertsRes.json();

      STATE.agents = agentsData.agents || [];
      STATE.activity = activityData.log || [];
      STATE.kb = kbData.updates || [];
      STATE.alerts = alertsData.alerts || [];

      render();
      document.getElementById('lastRefresh').textContent = 'Last refresh: ' + new Date().toLocaleTimeString();
    } catch (err) {
      console.error('Failed to load data:', err);
    }
  }

  function render() {
    renderAgents(STATE.agents, STATE.agentFilter);
    renderActivity(STATE.activity);
    renderKB(STATE.kb, STATE.kbFilter);
    renderAlerts(STATE.alerts);
    updateStats(STATE.agents, STATE.activity, STATE.kb, STATE.alerts);
  }

  // ── FILTER HANDLERS ──
  document.getElementById('agentFilters').addEventListener('click', (e) => {
    if (!e.target.classList.contains('filter-tab')) return;
    document.querySelectorAll('#agentFilters .filter-tab').forEach(t => t.classList.remove('active'));
    e.target.classList.add('active');
    STATE.agentFilter = e.target.dataset.filter;
    renderAgents(STATE.agents, STATE.agentFilter);
  });

  document.getElementById('kbFilters').addEventListener('click', (e) => {
    if (!e.target.classList.contains('filter-tab')) return;
    document.querySelectorAll('#kbFilters .filter-tab').forEach(t => t.classList.remove('active'));
    e.target.classList.add('active');
    STATE.kbFilter = e.target.dataset.filter;
    renderKB(STATE.kb, STATE.kbFilter);
  });

  // ── INIT ──
  loadData();
  // Auto-refresh every 60 seconds
  setInterval(loadData, 60000);
</script>

</body>
</html>
